apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-language-editor
spec:
  ingressClassName: nginx
  rules:
    - host: ai-language-editor.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-language-editor
                port:
                  number: 80
